name: Generate Redistricting Plan

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libgdal-dev libgeos-dev libproj-dev libudunits2-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-ubuntu-${{ hashFiles('.github/workflows/generate-plan.yml') }}
          restore-keys: r-pkgs-ubuntu-

      - name: Install R packages
        shell: Rscript {0}
        run: |
          install.packages(
            c("optparse", "sf", "redist", "dplyr", "jsonlite"),
            repos = "https://cloud.r-project.org"
          )

      - name: Generate plan
        id: plan
        run: |
          TIMESTAMP=$(date -u +%Y%m%d_%H%M%S)
          DISTRICTS=$((RANDOM % 10 + 5))
          SEED=$RANDOM
          OUTFILE="static_maps/${TIMESTAMP}_d$(printf '%02d' $DISTRICTS)_s${SEED}.json"
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          echo "districts=$DISTRICTS" >> $GITHUB_OUTPUT
          echo "seed=$SEED"           >> $GITHUB_OUTPUT
          echo "outfile=$OUTFILE"     >> $GITHUB_OUTPUT
          Rscript redistrict.R \
            --districts "$DISTRICTS" \
            --seed      "$SEED" \
            --name      "$DISTRICTS Districts ($TIMESTAMP)" \
            --output    "$OUTFILE"

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ steps.plan.outputs.outfile }}" static_maps/index.json
          git commit -m "Add ${{ steps.plan.outputs.districts }}-district plan (${{ steps.plan.outputs.timestamp }})"
          git push
